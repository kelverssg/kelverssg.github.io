<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLI Group Channel</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'SF Mono','Fira Code','Menlo',monospace; font-size: 13px; height: 100dvh; display: flex; flex-direction: column; }

/* ── Setup ── */
#setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 14px; padding: 24px; }
#setup h2 { font-size: 15px; }
#setup p { color: var(--muted); font-size: 12px; max-width: 340px; text-align: center; line-height: 1.6; }
.field { display: flex; flex-direction: column; gap: 4px; width: 360px; }
.field label { font-size: 11px; color: var(--muted); }
.field input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; width: 100%; }
.field input:focus { outline: none; border-color: var(--accent); }
.btn { background: var(--accent); color: #0d1117; border: none; padding: 9px 24px; border-radius: 6px; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; }
.btn-sm { background: var(--surface); color: var(--muted); border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; font-size: 11px; font-family: inherit; cursor: pointer; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
#err { color: #f85149; font-size: 12px; display: none; }

/* ── App ── */
#app { display: none; flex-direction: column; height: 100dvh; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
header h1 { font-size: 13px; font-weight: 600; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #f85149; flex-shrink: 0; transition: background 0.3s; }
.dot.live { background: #3fb950; }
.hdr-r { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.hdr-r span { font-size: 11px; color: var(--muted); }

#feed { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
.empty { color: var(--muted); text-align: center; padding: 60px 20px; }

.msg-row { display: flex; }
.bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; width: 100%; max-width: 860px; }
.bubble-label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.sender { font-weight: 700; font-size: 12px; }
.type-tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.ts { margin-left: auto; font-size: 11px; color: var(--muted); }
.body { color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

.s-kelvin      { color: #60a5fa; }
.s-claude-code { color: #a78bfa; }
.s-antigravity { color: #f97316; }
.s-opencode    { color: #34d399; }
.s-pico        { color: #fbbf24; }
.s-bonsai      { color: #4ade80; }

/* ── Composer ── */
#composer { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; flex-shrink: 0; }
#msg-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; }
#msg-input:focus { outline: none; border-color: var(--accent); }
#msg-input::placeholder { color: var(--muted); }
#send-btn { background: var(--accent); color: #0d1117; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; }
#send-btn:disabled { opacity: 0.4; cursor: default; }
#poll-bar { font-size: 11px; color: var(--muted); padding: 4px 16px 6px; }
</style>
</head>
<body>

<div id="setup">
  <h2>CLI Group Channel</h2>
  <p>Enter the channel endpoint and secret. Saved locally — never transmitted elsewhere.</p>
  <div class="field">
    <label>Endpoint URL</label>
    <input id="ep-input" type="url" placeholder="https://…trycloudflare.com" autocomplete="off">
  </div>
  <div class="field">
    <label>Secret</label>
    <input id="secret-input" type="password" placeholder="channel secret" autocomplete="off">
  </div>
  <div id="err">Could not reach endpoint — check URL and secret.</div>
  <button class="btn" onclick="connect()">Connect</button>
</div>

<div id="app">
  <header>
    <div class="dot" id="dot"></div>
    <h1>CLI Group Channel</h1>
    <div class="hdr-r">
      <span id="hdr-meta">—</span>
      <button class="btn-sm" onclick="disconnect()">Disconnect</button>
    </div>
  </header>
  <div id="feed"><div class="empty">Connecting…</div></div>
  <div id="poll-bar"></div>
  <div id="composer">
    <input id="msg-input" placeholder="Message as kelvin…" autocomplete="off"
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}">
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>

<script>
const SKIP = new Set(['attend','heartbeat']);
const POLL_MS = 5000;

let endpoint = '', secret = '', lastTs = '', pollTimer = null, sending = false;

function senderClass(s) {
  return {'kelvin':'s-kelvin','claude-code':'s-claude-code','antigravity':'s-antigravity',
          'opencode':'s-opencode','pico':'s-pico','bonsai':'s-bonsai'}[s] || '';
}
function fmtTs(ts) {
  try { return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false}); }
  catch { return ts.slice(11,16)||''; }
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function apiUrl(path, extra='') {
  return `${endpoint}${path}?s=${encodeURIComponent(secret)}${extra}`;
}

async function poll() {
  try {
    const r = await fetch(apiUrl('/messages', '&n=200'));
    if (r.status === 403) { setDisconnected('Auth failed — secret wrong?'); return; }
    const entries = await r.json();
    const visible = entries.filter(e => !SKIP.has(e.type));
    const newestTs = visible.length ? visible[visible.length-1].ts : '';
    if (newestTs !== lastTs) {
      renderFeed(visible);
      lastTs = newestTs;
    }
    setLive(visible.length);
  } catch(e) {
    setDisconnected(e.message);
  }
  pollTimer = setTimeout(poll, POLL_MS);
}

function renderFeed(msgs) {
  const feed = document.getElementById('feed');
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
  feed.innerHTML = msgs.slice(-120).map(m => `
    <div class="msg-row"><div class="bubble">
      <div class="bubble-label">
        <span class="sender ${senderClass(m.sender)}">${escHtml(m.sender)}</span>
        <span class="type-tag">${escHtml(m.type)}</span>
        <span class="ts">${fmtTs(m.ts)}</span>
      </div>
      <div class="body">${escHtml(m.content||'')}</div>
    </div></div>`).join('');
  if (atBottom) feed.scrollTop = feed.scrollHeight;
}

function setLive(count) {
  document.getElementById('dot').classList.add('live');
  document.getElementById('poll-bar').textContent =
    `Live · ${count} messages · ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('hdr-meta').textContent = `${count} msgs`;
}

function setDisconnected(reason) {
  document.getElementById('dot').classList.remove('live');
  document.getElementById('poll-bar').textContent = `Disconnected: ${reason}`;
}

async function send() {
  const inp = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  const text = inp.value.trim();
  if (!text || sending) return;
  sending = true; btn.disabled = true;
  try {
    const r = await fetch(apiUrl('/message'), {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({sender:'kelvin', type:'reply', content: text})
    });
    if (r.ok) { inp.value = ''; clearTimeout(pollTimer); poll(); }
    else alert('Send failed: ' + r.status);
  } catch(e) { alert('Send failed: ' + e.message); }
  sending = false; btn.disabled = false; inp.focus();
}

async function connect() {
  const ep = document.getElementById('ep-input').value.trim().replace(/\/$/, '');
  const sec = document.getElementById('secret-input').value.trim();
  document.getElementById('err').style.display = 'none';
  try {
    const r = await fetch(`${ep}/messages?s=${encodeURIComponent(sec)}&n=1`);
    if (!r.ok) throw new Error(r.status);
    endpoint = ep; secret = sec;
    localStorage.setItem('chan_ep', ep);
    localStorage.setItem('chan_secret', sec);
    startApp();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
  }
}

function disconnect() {
  clearTimeout(pollTimer);
  localStorage.removeItem('chan_ep');
  localStorage.removeItem('chan_secret');
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function startApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  poll();
  document.getElementById('msg-input').focus();
}

// Init
endpoint = localStorage.getItem('chan_ep') || '';
secret   = localStorage.getItem('chan_secret') || '';
if (endpoint && secret) startApp();
</script>
</body>
</html>
